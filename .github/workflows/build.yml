name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FLUTTER_VERSION: '3.44.0'

jobs:
  android:
    name: Android APK (debug)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - run: flutter pub get

      - run: flutter analyze

      - run: flutter test

      - run: flutter build apk --debug

      - uses: actions/upload-artifact@v4
        with:
          name: pkidz-android-debug
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 14

  ios:
    name: iOS IPA (unsigned, for jailbroken iPad)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - run: flutter pub get

      - run: flutter build ios --release --no-codesign

      - name: Package unsigned IPA
        run: |
          set -e
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -R Runner.app Payload/
          mkdir -p ../ipa
          zip -qry ../ipa/pkidz-unsigned.ipa Payload
          ls -la ../ipa

      - uses: actions/upload-artifact@v4
        with:
          name: pkidz-ios-unsigned-ipa
          path: build/ios/ipa/pkidz-unsigned.ipa
          retention-days: 14
